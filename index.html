<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon.com. Spend less. Smile more.</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="navbar">
        <div class="nav-left">
            <div class="nav-logo">
                <a href="https://www.amazon.com/ref=nav_logo"><div class="logo border">
                </div></a>
            </div>
            <div class="nav-address">
                <button  class="nav-address-button border">
                    <div class="glow-box">
                        <span><pre style="color: #CCCCCC; font-size: 0.75rem;">     Deliver to</pre></span>
                        <div class="add-icon">
                            <i class="fa-solid fa-location-dot" style="color: rgb(255, 255, 255);"></i>
                            <p style="color: #ffffff; font-size: 1rem;" font-weight="bolder">India</p>
                        </div>
                    </div>
                </button>
            </div>
        </div>
        <div class="nav-fill-search">
            <div class="nav-search" tabindex="0">
                <select  class="select-search" name="select-search-items" id="select-search-items">
                    <option value="All">All</option>
                    <option value="Arts & Crafts">Arts & Crafts</option>
                    <option value="Books">Books</option>
                    <option value="Computers">Computers</option>
                </select>
                <input id="input-search" type="search" placeholder=" Search Amazon"><div><button class="search-icon"><i class="fa-brands fa-sistrix" style="color: rgb(0, 0, 0);"></i></button></div> 
            </div>
        </div>
        <div class="nav-tools-layout">
            <div class="language-icon">
                <div class="whole-lag-icon">
                    <a class="nav-lang-icon-anchortag" href="#">
                        <div class="line1"></div>
                        <div class="language-icon-en border">
                            <img id="british_flag" src="british_flag.png" width="21.6px"><p id="website_lang"> EN</p>
                        </div>
                    </a>
                </div>
                <button class="dropdown_icon_lang"><i class="fa-solid fa-caret-down" style="color: rgb(255, 255, 255);"></i></button>
            </div>
            <div class="nav-link-accountlist">
                <div class="nav-link-text-part border">
                    <a class="nav-link-anchortag" href="#">
                        <div class="line1_nav-link">Hello, sign in</div>
                        <span class="line2_nav-link"><b>Account & Lists</b></span> 
                    </a>
                </div>
                <button class="dropdown_icon_nav-link-accountlist"><i class="fa-solid fa-caret-down" style="color: rgb(255, 255, 255);"></i></button>
            </div>
            <div class="nav-orders-toolslayout border">
                <a class="Returns-orders href="#">
                    <div class="nav-order-inside-line1">Returns</div>
                    <span class="nav-order-inside-line2"><b>& Orders</b></span>
                </a>
            </div>
            <div class="nav-cart-toolslayout border">
                <a class="cart-image-text-anchortag" href="#">
                    <div class="cart-inside">
                        0
                    </div>
                    <div class="cart-icon">
                        <i class="fa-solid fa-cart-shopping" style="color: rgb(255, 255, 255);"></i>
                    </div>
                    <span class="cart-text">
                        <b>Cart</b>
                    </span> 
                </a>

            </div>
        </div>
    </div>
    <div class="navbar-main-second">
        <div class="nav-hamburger-menu border">
            <span id="menu-icon"><i class="fa-solid fa-bars" style="color: rgb(255, 255, 255);"></i></span>
            <span id="nav-hamburger-menu-text"><b>All</b></span>
        </div>
        <div class="nav-xshop">
            <div class="nav-div">
                <a class="nav-a text-color border" href="#">Today's Deals</a>
            </div>
            <div class="nav-div">
                <a class="nav-a text-color border" href="#">Gift Cards</a>
            </div>
            <div class="nav-div">
                <a class="nav-a text-color border" href="#">Sell</a>
            </div>
            <div class="nav-div">
                <a class="nav-a text-color border" href="#">Prime Video</a>
            </div>
            <div class="nav-div">
                <a class="nav-a text-color border" href="#">Registry</a>
            </div>
            <div class="nav-div">
                <a class="nav-a text-color border" href="#">Customer Service</a>
            </div>
        </div>
        <div class="swmslot"></div>
        
    </div>
    <div class="shopping-section">
        <div class="hero-sec-background-image">
            <a class="background-image-link-anchor" href="#"><img src="hero_image.jpg"></a>
        </div>
    </div>
    
</body>
</html>
